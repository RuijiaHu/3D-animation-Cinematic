<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematic — RuijiaHu</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 1100px;
      padding: 48px 24px 24px;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
    }

    header p {
      margin-top: 8px;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: #666;
      text-transform: uppercase;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8a96e, transparent);
      margin: 20px auto;
    }

    .video-wrapper {
      width: 100%;
      max-width: 1100px;
      padding: 0 24px;
    }

    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid #1e1e1e;
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), 0 0 0 1px #111;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Cinematic letterbox bars (decorative) */
    .bar-top,
    .bar-bottom {
      position: absolute;
      left: 0;
      width: 100%;
      height: 0;
      background: #000;
      pointer-events: none;
      z-index: 1;
      transition: height 0.4s ease;
    }
    .bar-top { top: 0; }
    .bar-bottom { bottom: 0; }

    .video-container:not(:hover) .bar-top,
    .video-container:not(:hover) .bar-bottom {
      height: 0;
    }

    footer {
      margin: 40px 0 32px;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: #333;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <h1>Arial Cinematic</h1>
    <div class="divider"></div>
    <p>RuijiaHu &mdash; 3D Animation</p>
  </header>

  <div class="video-wrapper">
    <div class="video-container">
      <div class="bar-top"></div>
      <video controls preload="metadata" poster="">
        <source src="RuijiaHu_Arial_Cinematic.mp4" type="video/mp4">
        Your browser does not support video playback.
      </video>
      <div class="bar-bottom"></div>
    </div>
  </div>

  <footer>&copy; 2026 RuijiaHu</footer>

</body>
</html>
